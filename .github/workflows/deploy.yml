name: Deploy Portfolio Demo

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Required so GitHub can issue the OIDC token to AWS
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::389656351792:role/aws-cicd-portfolio-demo-github-deploy
  S3_BUCKET: anthonydls-cicd-demo-389656351792
  CLOUDFRONT_DISTRIBUTION_ID: E2GBTQ2MJXAB21

jobs:
  deploy:
    name: Deploy Site to S3 + CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Authenticate to AWS with NO stored credentials ──
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Note: Terraform does NOT run here. Infrastructure (S3, CloudFront,
      # IAM, OIDC) is bootstrapped once, locally, by running `terraform apply`
      # from your own PC. This pipeline's IAM role is intentionally scoped to
      # ONLY read/write the S3 bucket and invalidate CloudFront — it cannot
      # create new AWS resources. That's why this step is content-only.

      - name: Sync site to S3
        run: |
          aws s3 sync ./site s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Print live URL
        run: echo "✅ Live at https://d3q90y21gu1600.cloudfront.net"
